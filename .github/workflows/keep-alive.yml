name: Keep Streamlit Awake

# Streamlit Community Cloud hibernates an app after ~12h with no REAL traffic.
# A plain `curl` returns HTTP 200 from a static sleep shell WITHOUT booting the
# app, so it neither keeps the app awake nor wakes it. This job instead loads the
# app in headless Chromium (Playwright) — opening the WebSocket session that
# actually resets the inactivity timer — and clicks "Yes, get this app back up!"
# if it finds the app sleeping. See .github/scripts/keep_awake.py.

on:
  schedule:
    # Request every 10 min, offset off round-ten boundaries (:03,:13,... instead
    # of :00,:10,...). GitHub throttles scheduled runs on free public repos and
    # drops more of them at congested round-number minutes; the offset reduces
    # that. Actual cadence is still often ~1-2h, but that's far under Streamlit's
    # ~12h sleep threshold, so the app stays awake with comfortable margin.
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:   # manual "wake now" button in the Actions tab

# Never let two keep-alive runs overlap.
concurrency:
  group: keep-alive
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          pip install --quiet playwright
          python -m playwright install --with-deps chromium

      - name: Visit app and wake it if sleeping
        run: python .github/scripts/keep_awake.py

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshot
          path: app.png
          if-no-files-found: ignore
          retention-days: 3

  # Keep THIS scheduled workflow permanently enabled. GitHub auto-disables
  # scheduled workflows in a PUBLIC repo after 60 days with no repository
  # activity (official, documented behavior — there is no opt-out toggle, and a
  # disabled workflow stops firing until manually re-enabled). This job
  # pre-emptively re-enables the workflow via the Actions REST API on every run,
  # using only the built-in GITHUB_TOKEN — no commits, no PAT, no external
  # service. It runs independently of whether the app-wake step above succeeds.
  # Action pinned to a commit SHA (v1.2.1) for supply-chain safety.
  # See https://github.com/liskin/gh-workflow-keepalive
  keepalive:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@f72ff1a1336129f29bf0166c0fd0ca6cf1bcb38c  # v1.2.1
